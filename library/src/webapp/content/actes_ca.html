<!DOCTYPE html>
<html lang="ca-ES">
<head>
    <title>Actes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/library/js/headscripts.js"></script>
    <link rel="stylesheet" href="/library/content/gateway/gateway.scss">
</head>
<script>
	includeWebjarLibrary("bootstrap", {includeCss: true});
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<style>
    :root {
              --primary-color: #830051;
              --secondary-color: #f2e6ee;
              --accent-color: #d63384;
              --text-color: #333;
              --background-color: ##ffffff;
           }
           body {
              font-family:  "Open Sans", sans-serif;
              font-size: 0.9rem;
              margin: 0;
              background-color: var(--background-color);
              color: var(--text-color);
        }

        main {
              padding-right: 1rem;
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
              gap: 1rem;
        }
        
        .section {
              margin-bottom: 2rem;
        }

        .section h2 {
              font-size: 3rem;
              margin-bottom: 1rem;
              border-bottom: 2px solid var(--primary-color);
              padding-bottom: 0.5rem;
              text-align: center;
        }

        .filter-bar {	
              margin-bottom: 1rem;
              text-align: center;
        }

        .filter-bar input[type="text"] {
              padding: 0.5rem;
              width: 80%;
              max-width: 400px;
              border: 1px solid #ccc;
              border-radius: 5px;
              font-size: 0.9rem;
        }

        .gridSection {
              display: grid;
              grid-template-rows: repeat(auto-fit, minmax(80px, 1fr));
              gap: 0.4rem;
        }

        .card {
              background-color: white;
              border-radius: 10px;
              box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
              padding: 1rem;
              display: flex;
              flex-direction: column;
              align-items: center;
              text-align: center;
              transition: transform 0.2s;
              text-decoration: none;
              color: inherit;
        }

        .card:hover {
              transform: scale(1.02);
              background-color: var(--secondary-color);
        }

        .card i {
              font-size: 2.5rem;
              margin-bottom: 0.5rem;
              color: var(--primary-color);
        }

        .card-title {
	      font-size: 2.5rem;	
              font-weight: bold;
        }

        .card-subtitle {
              font-size: 2rem;
              color: #666;
        }

        footer {
              background-color: var(--secondary-color);
              text-align: center;
              padding: 1rem;
              font-size: 0.9rem;
        }

        a.card {
              cursor: pointer;
        }
</style>
<body>
    <main>
        <div class="section">
            <h2><b>Actes</b></h2>
            <div class="gridSection">
                <a href="https://esecretaria.udl.cat/ac_app/f?p=402600" target="_blank" class="card">
                    <i class="bi bi-box-arrow-in-right" aria-label="Feu clic per accedir a l'eina"></i>
                    <div class="card-title">Eina d&apos;actes</div>
                    <div class="card-subtitle">Feu clic aqu&acute; per a accedir a l&apos;eina</div>
                </a>
            </div>
            <div class="gridSection">
                <a href="https://www.udl.cat/ca/serveis/aga/.galleries/docs/matricula/QUALIFICACIO-ACTES-WEB-docents.pdf" target="_blank" class="card"><i class="bi bi-info-circle" aria-label="Feu clic per a accedir al manual"></i>
                    <div class="card-title">Manual de l&apos;eina</div>
		    <div class="card-subtitle">Feu clic aqu&iacute; per a accedir al manual</div>
                </a>
            </div>
        </div>
    </main>

</body>
</html>
